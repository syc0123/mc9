name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Minecraft data
        run: node scripts/generate-mc-data.js

      - name: Build (OpenNext + webpack)
        run: npx @opennextjs/cloudflare build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Restructure output for Pages
        run: |
          node scripts/patch-worker.js
          cp -r .open-next/assets/. .open-next/
          [ -d .open-next/_next ] && mv .open-next/_next .open-next/next-static || true
          mv .open-next/worker.js .open-next/_worker.js

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .open-next --project-name=mc9 --branch=main --commit-message="deploy ${{ github.sha }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
