name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (OpenNext + webpack)
        run: npx @opennextjs/cloudflare build

      - name: Restructure output for Pages
        run: |
          cp -r .open-next/assets/. .open-next/
          # Patch worker.js to serve /_next/static/ and public files via env.ASSETS
          node -e "
            const fs = require('fs');
            let w = fs.readFileSync('.open-next/worker.js', 'utf8');
            const patch = \`
            // Serve static assets directly via ASSETS binding
            if (url.pathname.startsWith('/_next/static/') || url.pathname.startsWith('/_next/data/')) {
                return env.ASSETS.fetch(request);
            }\`;
            w = w.replace('// - \`Request\`s are handled by the Next server', patch + '\n            // - \`Request\`s are handled by the Next server');
            fs.writeFileSync('.open-next/worker.js', w);
          "
          mv .open-next/worker.js .open-next/_worker.js

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .open-next --project-name=mc9 --branch=main --commit-message="deploy ${{ github.sha }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
